{% extends "glowify/base.html" %}
{% load static %}
{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <!-- Left Illustration -->
        <div class="auth-illustration">
            <img src="{% static 'glowify/images/auth-girl.png' %}" alt="Login">
        </div>

        <!-- Right Form Card -->
        <div class="auth-card">
            <h2 class="auth-title">Welcome Back !</h2>

            <div class="auth-box">
                <h3>Sign-in to your Account</h3>

                <form method="POST">
                    {% csrf_token %}

                    <label>Email Id</label>
                    <input type="email" name="email" placeholder="nar@gmail.com" required>

                    <label>Password</label>
                    <div class="password-field">
                        <input type="password" name="password" placeholder="Enter Password" required>
                        <img src="{% static 'glowify/images/eye-off.png' %}" class="eye">
                    </div>

                    <div class="forgot">
                        <a href="#">Forget Password?</a>
                    </div>

                    <div class="remember">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </div>

                    <button class="btn-primary">Login</button>

                    <p class="switch">
                        Don’t have an account?
                        <a href="{% url 'register' %}">Signup</a>
                    </p>

                    <p class="instant">Instant Login</p>

                    <div class="social-login">
                        <button type="button" class="btn-social">
                            <img src="{% static 'glowify/images/G-auth.png' %}">
                            Continue With google
                        </button>
                        <button type="button" class="btn-social">
                            <img src="{% static 'glowify/images/fb-auth.png' %}">
                            Continue With facebook
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</section>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const loginForm = document.querySelector("form");

        if (!loginForm) return;

        let filled = false;

        loginForm.addEventListener("focusin", function () {
            if (filled) return;

            loginForm.querySelector('input[name="email"]').value = "narmatha@gmail.com";
            loginForm.querySelector('input[name="password"]').value = "XXXXXX";

            filled = true; // run only once
        });
    });
</script>

{% endblock %}
